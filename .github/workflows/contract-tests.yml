name: Contract Tests

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'tests/**'
      - 'Clarinet.toml'
      - 'vitest.config.mjs'
  pull_request:
    paths:
      - 'contracts/**'
      - 'tests/**'

jobs:
  test:
    name: Run Clarinet tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test
