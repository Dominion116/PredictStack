[project]
name = "PredictStack"
description = "A peer-to-peer prediction market platform on Stacks"
authors = []
telemetry = true
cache_dir = "./.cache"

# Main Prediction Market Contract (v4 - increased gas costs for admin functions)
[contracts.predictstacksv4]
path = "contracts/predictstacksv4.clar"
clarity_version = 2
epoch = 2.1

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
