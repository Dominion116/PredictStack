[project]
name = "PredictStack"
description = "A peer-to-peer prediction market platform on Stacks"
authors = []
telemetry = true
cache_dir = "./.cache"

# Main Prediction Market Contract (v2 - adds unique-bettors counter)
[contracts.predictstacksv2]
path = "contracts/predictstacksv2.clar"
clarity_version = 2
epoch = 2.1

[repl.analysis]
passes = ["check_checker"]
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }
